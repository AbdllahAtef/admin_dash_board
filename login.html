<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduAdmin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif;
           background-image:url(/images/backgroundimage.jpeg);
           background-size: cover; 
           background-position: center;}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6"></body>

  <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
    
    <!-- Header -->
    <div class="bg-[#6a0050] px-8 py-10 text-center">
      <h1 class="font-['Plus_Jakarta_Sans'] font-black text-3xl text-white tracking-tight mb-1">EduAdmin</h1>
      <p class="text-purple-200 text-sm">University Management System</p>
    </div>

    <!-- Form -->
    <div class="p-8 space-y-5">
      <div>
        <h2 class="text-2xl font-bold text-slate-800 mb-1">Welcome back</h2>
        <p class="text-sm text-slate-500">Sign in to your admin account</p>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 mb-2">Username</label>
        <input id="email" type="text" placeholder="Enter email..." 
          class="w-full bg-slate-50 rounded-2xl px-5 py-4 text-sm border-none outline-none focus:ring-2 focus:ring-purple-300"/>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 mb-2">Password</label>
        <input id="password" type="password" placeholder="Enter password..." 
          class="w-full bg-slate-50 rounded-2xl px-5 py-4 text-sm border-none outline-none focus:ring-2 focus:ring-purple-300"/>
      </div>

      <p id="error-msg" class="text-red-500 text-xs hidden">Wrong username or password</p>

      <button onclick="handleLogin()" 
        class="w-full bg-[#6a0050] text-white py-4 rounded-2xl font-bold text-sm hover:bg-[#8b1a6b] transition-colors">
        Log In
      </button>
    </div>
  </div>
<script>
function showSection(sectionId) {
    document.querySelectorAll(".section-content").forEach(sec => {
        sec.classList.add("hidden");
    });

    document.getElementById("section-" + sectionId).classList.remove("hidden");
}
</script>


</body>
</html>
